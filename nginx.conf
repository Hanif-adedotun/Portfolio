server {
    server_name hanif.one v2.hanif.one;

    root /var/www/v2.hanif.one/dist;
    index index.html;

    access_log /var/log/nginx/hanif.one.access.log;
    error_log /var/log/nginx/hanif.one.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_certificate /etc/letsencrypt/live/v2.hanif.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/v2.hanif.one/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;

    server_name hanif.one v2.hanif.one;
    return 301 https://$host$request_uri;
}
